<svg viewBox="0 0 960 440" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>Canonify in your workflow: plan, build, commit</title>
  <desc>Plan when you start a new plan; Build once the plan is set, before code; Commit after all phases are built. All three gates read CANONIFY.md.</desc>
  <defs>
    <marker id="aw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="958" height="438" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="40" y="50" font-size="26" font-weight="700" fill="#0f172a">Canonify in your workflow</text>
  <text x="42" y="77" font-size="14" fill="#475569">The three lifecycle gates run at three moments.</text>

  <text x="55" y="113" font-size="11" font-weight="700" fill="#6366f1" letter-spacing="0.5">WHEN  you start a new plan</text>
  <text x="360" y="113" font-size="11" font-weight="700" fill="#6366f1" letter-spacing="0.5">WHEN  the plan is set, before code</text>
  <text x="665" y="113" font-size="11" font-weight="700" fill="#6366f1" letter-spacing="0.5">WHEN  all phases are built</text>

  <rect x="40" y="124" width="270" height="150" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="58" y="156" font-size="14" font-weight="700" fill="#334155" font-family="ui-monospace, Menlo, monospace">/canonify:plan</text>
  <text x="58" y="185" font-size="20" font-weight="700" fill="#0f172a">Plan</text>
  <text x="58" y="211" font-size="12.5" fill="#475569">Loads the project's breadth so you</text>
  <text x="58" y="229" font-size="12.5" fill="#475569">design with what already exists -</text>
  <text x="58" y="247" font-size="12.5" fill="#475569">a reuse-vs-build triage.</text>

  <rect x="345" y="124" width="270" height="150" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="363" y="156" font-size="14" font-weight="700" fill="#334155" font-family="ui-monospace, Menlo, monospace">/canonify:build</text>
  <text x="363" y="185" font-size="20" font-weight="700" fill="#0f172a">Build</text>
  <text x="363" y="211" font-size="12.5" fill="#475569">Routes the task to the exact canons</text>
  <text x="363" y="229" font-size="12.5" fill="#475569">it needs, with their gotchas -</text>
  <text x="363" y="247" font-size="12.5" fill="#475569">so you follow the pattern.</text>

  <rect x="650" y="124" width="270" height="150" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="668" y="156" font-size="14" font-weight="700" fill="#334155" font-family="ui-monospace, Menlo, monospace">/canonify:commit</text>
  <text x="668" y="185" font-size="20" font-weight="700" fill="#0f172a">Commit</text>
  <text x="668" y="211" font-size="12.5" fill="#475569">Audits the diff against the canons -</text>
  <text x="668" y="229" font-size="12.5" fill="#475569">the last gate before you ship.</text>

  <path d="M312,199 L343,199" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#aw)"/>
  <path d="M617,199 L648,199" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#aw)"/>

  <rect x="40" y="330" width="880" height="62" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="480" y="357" text-anchor="middle" font-size="14" font-weight="700" fill="#3730a3" font-family="ui-monospace, Menlo, monospace">CANONIFY.md</text>
  <text x="480" y="377" text-anchor="middle" font-size="12" fill="#6366f1">the canons your project already uses - all three gates read it</text>

  <path d="M175,328 L175,277" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#aw)"/>
  <path d="M480,328 L480,277" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#aw)"/>
  <path d="M785,328 L785,277" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#aw)"/>
  <text x="492" y="307" font-size="10.5" fill="#94a3b8">reads</text>

  <text x="480" y="420" text-anchor="middle" font-size="11.5" fill="#64748b">/canonify:kickoff sets it up once   -   /canonify:create-canon adds a canon   -   /canonify:doctor catches drift</text>
</svg>
