<svg viewBox="0 0 1280 550" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>Canonify in your workflow: plan, build, commit - with Claude working between the gates</title>
  <desc>The Plan gate, then you draft the plan with Claude (canon breadth in context); the Build gate, then Claude writes the code (the matched canons in context); the Commit gate. All three gates read CANONIFY.md.</desc>
  <defs>
    <marker id="aw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <g id="claude">
      <circle r="18" fill="#ffffff" stroke="#eccab9" stroke-width="1"/>
      <g stroke="#d97757" stroke-width="2.3" stroke-linecap="round">
        <line x1="3.5" y1="0" x2="13" y2="0"/>
        <line x1="3.03" y1="1.75" x2="7.36" y2="4.25"/>
        <line x1="1.75" y1="3.03" x2="6.5" y2="11.26"/>
        <line x1="0" y1="3.5" x2="0" y2="8.5"/>
        <line x1="-1.75" y1="3.03" x2="-6.5" y2="11.26"/>
        <line x1="-3.03" y1="1.75" x2="-7.36" y2="4.25"/>
        <line x1="-3.5" y1="0" x2="-13" y2="0"/>
        <line x1="-3.03" y1="-1.75" x2="-7.36" y2="-4.25"/>
        <line x1="-1.75" y1="-3.03" x2="-6.5" y2="-11.26"/>
        <line x1="0" y1="-3.5" x2="0" y2="-8.5"/>
        <line x1="1.75" y1="-3.03" x2="6.5" y2="-11.26"/>
        <line x1="3.03" y1="-1.75" x2="7.36" y2="-4.25"/>
      </g>
      <circle r="2.4" fill="#d97757"/>
    </g>
  </defs>
  <rect x="1" y="1" width="1278" height="548" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="40" y="44" font-size="26" font-weight="700" fill="#0f172a">Canonify in your workflow</text>
  <text x="42" y="72" font-size="14" fill="#475569">The three lifecycle gates wrap the work Claude does in between.</text>

  <!-- Claude work, lifted above the gates -->
  <rect x="265" y="96" width="280" height="116" rx="12" fill="#fdf6f2" stroke="#e7c3b3" stroke-width="1.5"/>
  <g transform="translate(295,126) scale(0.62)"><use href="#claude"/></g>
  <text x="317" y="131" font-size="14" font-weight="700" fill="#9a3412">Claude drafts the plan</text>
  <text x="285" y="159" font-size="12" fill="#475569">You and Claude draft the plan with</text>
  <text x="285" y="177" font-size="12" fill="#475569">the high-level architecture of your</text>
  <text x="285" y="195" font-size="12" fill="#475569">canons already held in context.</text>

  <rect x="735" y="96" width="280" height="116" rx="12" fill="#fdf6f2" stroke="#e7c3b3" stroke-width="1.5"/>
  <g transform="translate(765,126) scale(0.62)"><use href="#claude"/></g>
  <text x="787" y="131" font-size="14" font-weight="700" fill="#9a3412">Claude writes the code</text>
  <text x="755" y="159" font-size="12" fill="#475569">Claude writes it with every canon</text>
  <text x="755" y="177" font-size="12" fill="#475569">the Build gate matched to your plan</text>
  <text x="755" y="195" font-size="12" fill="#475569">now loaded in its context.</text>

  <!-- zig-zag: each gate steps up into the Claude box, then down into the next gate -->
  <path d="M255,276 C295,250 300,224 322,214" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#aw)"/>
  <path d="M495,214 C500,238 503,258 515,276" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#aw)"/>
  <path d="M745,276 C780,250 786,224 808,214" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#aw)"/>
  <path d="M958,214 C964,238 967,258 984,276" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#aw)"/>

  <text x="55" y="264" font-size="11" font-weight="700" fill="#6366f1" letter-spacing="0.5">WHEN  you start a new plan</text>
  <text x="525" y="264" font-size="11" font-weight="700" fill="#6366f1" letter-spacing="0.5">WHEN  the plan is set, before code</text>
  <text x="995" y="264" font-size="11" font-weight="700" fill="#6366f1" letter-spacing="0.5">WHEN  all phases are built</text>

  <rect x="40" y="278" width="260" height="150" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="58" y="310" font-size="14" font-weight="700" fill="#334155" font-family="ui-monospace, Menlo, monospace">/canonify:plan</text>
  <text x="58" y="339" font-size="20" font-weight="700" fill="#0f172a">Plan</text>
  <text x="58" y="365" font-size="12.5" fill="#475569">Loads the project's breadth so you</text>
  <text x="58" y="383" font-size="12.5" fill="#475569">design with what already exists -</text>
  <text x="58" y="401" font-size="12.5" fill="#475569">a reuse-vs-build triage.</text>

  <rect x="510" y="278" width="260" height="150" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="528" y="310" font-size="14" font-weight="700" fill="#334155" font-family="ui-monospace, Menlo, monospace">/canonify:build</text>
  <text x="528" y="339" font-size="20" font-weight="700" fill="#0f172a">Build</text>
  <text x="528" y="365" font-size="12.5" fill="#475569">Routes the task to the exact canons</text>
  <text x="528" y="383" font-size="12.5" fill="#475569">it needs, with their gotchas -</text>
  <text x="528" y="401" font-size="12.5" fill="#475569">so you follow the pattern.</text>

  <rect x="980" y="278" width="260" height="150" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="998" y="310" font-size="14" font-weight="700" fill="#334155" font-family="ui-monospace, Menlo, monospace">/canonify:commit</text>
  <text x="998" y="339" font-size="20" font-weight="700" fill="#0f172a">Commit</text>
  <text x="998" y="365" font-size="12.5" fill="#475569">Audits the diff against the canons -</text>
  <text x="998" y="383" font-size="12.5" fill="#475569">the last gate before you ship.</text>

  <rect x="40" y="456" width="1200" height="62" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="640" y="483" text-anchor="middle" font-size="14" font-weight="700" fill="#3730a3" font-family="ui-monospace, Menlo, monospace">CANONIFY.md</text>
  <text x="640" y="503" text-anchor="middle" font-size="12" fill="#6366f1">the canons your project already uses - all three gates read it</text>

  <path d="M170,454 L170,431" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#aw)"/>
  <path d="M640,454 L640,431" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#aw)"/>
  <path d="M1110,454 L1110,431" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#aw)"/>
  <text x="652" y="446" font-size="10.5" fill="#94a3b8">reads</text>

  <text x="640" y="540" text-anchor="middle" font-size="11.5" fill="#64748b">/canonify:kickoff sets it up once   -   /canonify:create-canon adds a canon   -   /canonify:doctor catches drift</text>
</svg>
